services:
  mysql:
    image: mysql:8.0
    container_name: supaproxy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: supaproxy
    ports:
      - "3308:3306"
    volumes:
      - supaproxy-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: supaproxy-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - supaproxy-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: supaproxy-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  supaproxy-mysql-data:
  supaproxy-redis-data:
