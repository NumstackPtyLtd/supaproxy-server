workspace:
  id: ws-demo
  name: Reclaim Demo
  team: Demo Team
  created: "2026-04-17"
  status: active

  mcp_servers:
    - name: demo-static
      transport: stdio
      command: node
      args:
        - src/core/demo-mcp-server.js

  knowledge:
    sources:
      - type: inline
        content: |
          This is the Reclaim demo workspace. It has a mock MCP server that returns
          static data for testing. Use it to verify Reclaim is working without
          connecting to a real service.

          Available tools:
          - echo: repeats back what you send (for testing)
          - get-time: returns the current server time
          - get-workspace-info: returns info about this workspace

  consumers:
    slack:
      channels: []  # add a channel ID to test
      allow_dms: true
      thread_context: true

  permissions:
    roles:
      - role: support
        tools: ["*"]
      - role: developer
        tools: ["*"]

  guardrails:
    pii_filter: false
    write_confirmation: false
    cost_cap_monthly_usd: 10
    rate_limit:
      per_user_per_minute: 30
      per_workspace_per_hour: 1000

  system_prompt: |
    You are the Reclaim Demo Assistant. You have access to a few test tools
    that return static data. Use them to demonstrate how Reclaim works.
    Be friendly and explain what's happening behind the scenes.

  # Set to your preferred model ID (e.g. claude-sonnet-4-20250514, gpt-4o)
  model: ${DEFAULT_MODEL}
  max_tool_rounds: 5
  max_thread_history: 20
